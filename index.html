<!DOCTYPE html>
<html lang="en">
<head>
<title>Page Deleted</title>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-image: url("https://i.imgur.com/o5RekSz.jpeg");
  --bg-color: #07111f;
}

body {
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background-color: var(--bg-color);
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

#wrap {
  text-align: center;
  padding: 48px 28px;
  max-width: 520px;
  background: rgba(25, 100, 200, 0.38);
  border: 2.5px solid rgba(255,255,255,0.6);
  border-radius: 22px;
  margin: 30px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}

#icon {
  font-size: 5.5rem;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

#title {
  font-family: 'Luckiest Guy', cursive;
  font-size: 2.8rem;
  color: #fff;
  letter-spacing: 0.06em;
  line-height: 1.2;
  text-shadow:
    2px 0 0 #000, -2px 0 0 #000,
    0 2px 0 #000, 0 -2px 0 #000,
    1px 1px 0 #000, -1px -1px 0 #000,
    4px 5px 0 #000;
}

#msg {
  font-family: 'Luckiest Guy', cursive;
  font-size: 1.25rem;
  color: #ffd700;
  letter-spacing: 0.09em;
  line-height: 1.6;
  text-shadow: 1px 1px 0 #8a5c00, 2px 3px 6px rgba(0,0,60,0.3);
}

@media(max-width:420px){
  #title { font-size: 2rem; }
  #msg   { font-size: 1rem; }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="icon">🎲</div>
  <div id="title">This Page Has Been Deleted.</div>
  <div id="msg">Thank you so much for your support on everything. It means the world. ❤️</div>
</div>
</body>
</html>
